worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 512;
}

http {
    access_log /dev/stdout;
    client_max_body_size 20m;

    client_body_temp_path /tmp/nginx_client 1 2;
    proxy_temp_path       /tmp/nginx_proxy  1 2;
    fastcgi_temp_path     /tmp/nginx_fastcgi 1 2;
    uwsgi_temp_path       /tmp/nginx_uwsgi  1 2;
    scgi_temp_path        /tmp/nginx_scgi   1 2;

    # ── Upstream: HIS gateway (real stack) ────────────────────────────────────
    # his_gateway is the container name set in docker-compose.yml
    upstream his_gateway {
        server his_gateway:8000;
    }

    server {
        listen 8099;

        # All traffic proxied to the HIS gateway once the stack is running.
        # run.sh only starts nginx AFTER the stack is ready, so this is always valid.
        location / {
            proxy_pass         http://his_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # Forward the HA ingress path prefix so the app can build correct URLs
            proxy_set_header   X-Forwarded-Prefix $http_x_ingress_path;
            proxy_read_timeout 120s;

            # SSE / streaming (deploy log, voice TTS)
            proxy_buffering    off;
            proxy_cache        off;
        }
    }
}
