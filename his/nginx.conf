worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 512;
}

http {
    access_log /dev/stdout;
    client_max_body_size 20m;

    client_body_temp_path /tmp/nginx_client 1 2;
    proxy_temp_path       /tmp/nginx_proxy  1 2;
    fastcgi_temp_path     /tmp/nginx_fastcgi 1 2;
    uwsgi_temp_path       /tmp/nginx_uwsgi  1 2;
    scgi_temp_path        /tmp/nginx_scgi   1 2;

    # ── Upstream: HIS gateway (real stack) ────────────────────────────────────
    # Use Docker's internal resolver (127.0.0.11) with a variable so nginx
    # defers DNS resolution to request time instead of failing at startup
    # when his_gateway doesn't exist yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 8099;

        location / {
            set $upstream http://his_gateway:8000;
            proxy_pass         $upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Prefix $http_x_ingress_path;
            proxy_read_timeout 120s;
            proxy_buffering    off;
            proxy_cache        off;

            # While his_gateway is starting up, serve a friendly loading page
            # instead of a bare 502. The page auto-refreshes every 4 seconds.
            proxy_intercept_errors on;
            error_page 502 503 504 =200 @loading;
        }

        location @loading {
            default_type text/html;
            return 200 '<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="4">
  <title>HIS — Starting…</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
         background:#0f172a;color:#e2e8f0;display:flex;align-items:center;
         justify-content:center;min-height:100vh;padding:1rem}
    .card{background:#1e293b;border:1px solid #334155;border-radius:1rem;
          padding:2.5rem 3rem;max-width:420px;width:100%;text-align:center}
    .logo{font-size:2.5rem;margin-bottom:1rem}
    h1{font-size:1.25rem;font-weight:600;color:#f1f5f9;margin-bottom:.5rem}
    p{font-size:.9rem;color:#94a3b8;line-height:1.6;margin-bottom:1.5rem}
    .dots{display:inline-flex;gap:.4rem}
    .dot{width:.55rem;height:.55rem;border-radius:50%;background:#6366f1;
         animation:pulse 1.2s ease-in-out infinite}
    .dot:nth-child(2){animation-delay:.2s}
    .dot:nth-child(3){animation-delay:.4s}
    @keyframes pulse{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
    .hint{font-size:.75rem;color:#475569;margin-top:1.5rem}
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🏠</div>
    <h1>Household Intelligence System</h1>
    <p>Starting up — this usually takes 10–20 seconds on first load.</p>
    <div class="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <div class="hint">Page refreshes automatically&hellip;</div>
  </div>
</body>
</html>';
        }
    }
}
