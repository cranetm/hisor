worker_processes 1;
error_log /dev/stderr warn;
pid /tmp/nginx.pid;

events {
    worker_connections 512;
}

http {
    access_log /dev/stdout;
    client_max_body_size 20m;

    client_body_temp_path /tmp/nginx_client 1 2;
    proxy_temp_path       /tmp/nginx_proxy  1 2;
    fastcgi_temp_path     /tmp/nginx_fastcgi 1 2;
    uwsgi_temp_path       /tmp/nginx_uwsgi  1 2;
    scgi_temp_path        /tmp/nginx_scgi   1 2;

    # ── Upstream: HIS gateway (real stack) ────────────────────────────────────
    # Use Docker's internal resolver (127.0.0.11) with a variable so nginx
    # defers DNS resolution to request time instead of failing at startup
    # when his_gateway doesn't exist yet.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 8099;

        location / {
            set $upstream http://his_gateway:8000;
            proxy_pass         $upstream;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Forwarded-Prefix $http_x_ingress_path;
            proxy_read_timeout 120s;
            proxy_buffering    off;
            proxy_cache        off;
        }
    }
}
