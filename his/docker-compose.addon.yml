# Add-on overlay for docker-compose.yml
# Applied by the HA add-on orchestrator instead of docker-compose.prod.yml.
#
# Differences from prod:
#   - No nginx container (the add-on container handles ingress proxying)
#   - No port 8080 exposure (traffic comes through HA ingress, not a public port)
#   - Attaches the add-on container to his_net so nginx inside it can reach his_gateway
#   - his_net declared as external (already created by docker compose up)

services:
  postgres:
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { memory: 512M }

  gateway:
    # Expose on host loopback only — traffic via add-on nginx, not public port
    ports:
      - "127.0.0.1:8000:8000"
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { memory: 512M }
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  ingestion:
    logging:
      driver: "json-file"
      options: { max-size: "10m", max-file: "3" }
    deploy:
      resources:
        limits: { memory: 256M }

networks:
  his_net:
    # The add-on container joins this network after stack starts (see run.sh).
    # Declaring it here avoids compose trying to create it if it already exists.
    external: false
